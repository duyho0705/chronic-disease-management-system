<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4ade80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Đăng ký - Sống Khỏe</title>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Navigation Header -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
                <div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
                    <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined">health_and_safety</span>
                    </div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">Sống Khỏe</h2>
                </div>
                <div class="flex items-center gap-4">
                    <span class="hidden md:block text-sm text-slate-500 dark:text-slate-400">Đã có tài khoản?</span>
                    <button
                        class="flex items-center justify-center rounded-xl h-10 bg-primary/10 dark:bg-primary/20 text-primary px-4 text-sm font-bold hover:bg-primary/20 transition-all">
                        Đăng nhập
                    </button>
                </div>
            </header>
            <main class="flex flex-1 justify-center py-10 px-4">
                <div
                    class="layout-content-container flex flex-col max-w-[520px] flex-1 bg-white dark:bg-slate-900/50 p-6 md:p-10 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                    <!-- Welcome Text -->
                    <div class="flex flex-col gap-2 mb-8 text-center md:text-left">
                        <h1
                            class="text-3xl md:text-4xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">
                            Tạo tài khoản</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-base font-medium">Tham gia cộng đồng Sống Khỏe
                            để quản lý sức khỏe tốt hơn mỗi ngày</p>
                    </div>
                    <!-- Registration Form -->
                    <form class="flex flex-col gap-5" onsubmit="return false;">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Họ và
                                tên</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                <input
                                    class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-base focus:border-primary focus:ring-primary/20 dark:text-white placeholder:text-slate-400 transition-all"
                                    placeholder="Nhập họ và tên của bạn" type="text" />
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Email</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                                <input
                                    class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-base focus:border-primary focus:ring-primary/20 dark:text-white placeholder:text-slate-400 transition-all"
                                    placeholder="example@gmail.com" type="email" />
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Số điện
                                thoại</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">call</span>
                                <input
                                    class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-base focus:border-primary focus:ring-primary/20 dark:text-white placeholder:text-slate-400 transition-all"
                                    placeholder="090 123 4567" type="tel" />
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1.5">
                                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Mật
                                    khẩu</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                                    <input
                                        class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-base focus:border-primary focus:ring-primary/20 dark:text-white placeholder:text-slate-400 transition-all"
                                        placeholder="••••••••" type="password" />
                                </div>
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Xác nhận
                                    mật khẩu</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock_reset</span>
                                    <input
                                        class="form-input flex w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-base focus:border-primary focus:ring-primary/20 dark:text-white placeholder:text-slate-400 transition-all"
                                        placeholder="••••••••" type="password" />
                                </div>
                            </div>
                        </div>
                        <div class="flex items-start gap-3 py-2">
                            <input
                                class="mt-1 rounded text-primary focus:ring-primary bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700"
                                id="terms" type="checkbox" />
                            <label class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed" for="terms">
                                Tôi đồng ý với <a class="text-primary hover:underline font-semibold" href="#">Điều khoản
                                    dịch vụ</a> và <a class="text-primary hover:underline font-semibold" href="#">Chính
                                    sách bảo mật</a> của Sống Khỏe.
                            </label>
                        </div>
                        <button
                            class="w-full bg-primary hover:bg-primary/90 text-white h-14 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                            <span>Đăng ký ngay</span>
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </form>
                    <!-- Divider -->
                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="bg-white dark:bg-slate-900 px-4 text-slate-400">Hoặc tiếp tục với</span>
                        </div>
                    </div>
                    <!-- Social Logins -->
                    <div class="grid grid-cols-2 gap-4">
                        <button
                            class="flex items-center justify-center gap-3 h-12 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <svg class="w-5 h-5" viewbox="0 0 24 24">
                                <path
                                    d="M12 5.04c1.9 0 3.51.64 4.85 1.91l3.62-3.62C18.23 1.33 15.35 0 12 0 7.31 0 3.32 2.68 1.41 6.59l4.23 3.29C6.64 7.08 9.09 5.04 12 5.04z"
                                    fill="#EA4335"></path>
                                <path
                                    d="M23.49 12.27c0-.85-.07-1.68-.21-2.48H12v4.69h6.44c-.28 1.51-1.13 2.79-2.41 3.65l3.86 2.99c2.26-2.09 3.6-5.17 3.6-8.85z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M5.64 14.86c-.24-.72-.37-1.49-.37-2.3s.13-1.58.37-2.3L1.41 6.59C.51 8.24 0 10.06 0 12s.51 3.76 1.41 5.41l4.23-3.29z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 24c3.24 0 5.96-1.07 7.95-2.91l-3.86-2.99c-1.1.74-2.51 1.18-4.09 1.18-2.91 0-5.36-2.04-6.25-4.81l-4.23 3.29C3.32 21.32 7.31 24 12 24z"
                                    fill="#34A853"></path>
                            </svg>
                            <span class="text-sm font-semibold">Google</span>
                        </button>
                        <button
                            class="flex items-center justify-center gap-3 h-12 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <svg class="w-5 h-5" fill="#1877F2" viewbox="0 0 24 24">
                                <path
                                    d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                                </path>
                            </svg>
                            <span class="text-sm font-semibold">Facebook</span>
                        </button>
                    </div>
                    <p class="mt-8 text-center text-slate-500 dark:text-slate-400 text-sm">
                        Bạn đã tham gia Sống Khỏe? <a class="text-primary font-bold hover:underline" href="#">Đăng nhập
                            ngay</a>
                    </p>
                </div>
            </main>
            <!-- Footer Small -->
            <footer class="py-6 px-10 border-t border-slate-100 dark:border-slate-800 text-center">
                <p class="text-xs text-slate-400">© 2024 Sống Khỏe. Đội ngũ bác sĩ đồng hành cùng bạn.</p>
            </footer>
        </div>
    </div>
</body>

</html>
