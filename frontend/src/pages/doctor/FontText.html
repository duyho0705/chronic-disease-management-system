<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4ade80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <!-- Background Dashboard (Blurred) -->
    <div class="fixed inset-0 z-0 overflow-hidden filter blur-sm pointer-events-none opacity-50">
        <nav
            class="h-16 border-b border-slate-200 dark:border-slate-800 flex items-center px-8 bg-white dark:bg-background-dark">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-white">medical_services</span>
                </div>
                <span class="font-bold text-xl">Sống Khỏe</span>
            </div>
        </nav>
        <main class="p-8 max-w-7xl mx-auto">
            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-3 h-64 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
                <div class="col-span-9 h-96 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
            </div>
        </main>
    </div>
    <!-- Modal Overlay -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-md p-4">
        <!-- Modal Container -->
        <div
            class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Đặt lịch tái khám</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Thiết lập lịch hẹn tiếp theo cho bệnh nhân</p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <!-- Modal Content (Scrollable) -->
            <div class="p-6 overflow-y-auto space-y-6">
                <!-- Patient Selection -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Bệnh nhân</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-sm">person</span>
                        </div>
                        <select
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-slate-900 dark:text-white appearance-none">
                            <option value="1">Nguyễn Văn A - ID: 2024001</option>
                            <option value="2">Trần Thị B - ID: 2024002</option>
                            <option value="3">Lê Văn C - ID: 2024003</option>
                        </select>
                        <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400">expand_more</span>
                        </div>
                    </div>
                </div>
                <!-- Appointment Type -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Hình thức khám</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer group">
                            <input checked="" class="peer hidden" name="type" type="radio" />
                            <div
                                class="flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all">
                                <span class="material-symbols-outlined text-xl">person_pin_circle</span>
                                <span class="text-sm font-medium">Khám trực tiếp</span>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input class="peer hidden" name="type" type="radio" />
                            <div
                                class="flex items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all">
                                <span class="material-symbols-outlined text-xl">videocam</span>
                                <span class="text-sm font-medium">Tư vấn trực tuyến</span>
                            </div>
                        </label>
                    </div>
                </div>
                <!-- Date & Time Picker Container -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Calendar -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Chọn ngày</label>
                        <div
                            class="p-4 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50/50 dark:bg-slate-800/50">
                            <div class="flex items-center justify-between mb-4">
                                <button
                                    class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
                                    <span class="material-symbols-outlined text-lg">chevron_left</span>
                                </button>
                                <span class="text-sm font-bold">Tháng 11 2024</span>
                                <button
                                    class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition-colors">
                                    <span class="material-symbols-outlined text-lg">chevron_right</span>
                                </button>
                            </div>
                            <div class="calendar-grid text-center text-[10px] font-bold text-slate-400 mb-2">
                                <div>S</div>
                                <div>M</div>
                                <div>T</div>
                                <div>W</div>
                                <div>T</div>
                                <div>F</div>
                                <div>S</div>
                            </div>
                            <div class="calendar-grid gap-1">
                                <!-- Days -->
                                <div class="text-xs h-8 flex items-center justify-center text-slate-300">27</div>
                                <div class="text-xs h-8 flex items-center justify-center text-slate-300">28</div>
                                <div class="text-xs h-8 flex items-center justify-center text-slate-300">29</div>
                                <div class="text-xs h-8 flex items-center justify-center text-slate-300">30</div>
                                <div class="text-xs h-8 flex items-center justify-center text-slate-300">31</div>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">1</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">2</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">3</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">4</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full bg-primary text-white font-bold">5</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">6</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">7</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">8</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">9</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">10</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">11</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">12</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">13</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">14</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">15</button>
                                <button
                                    class="text-xs h-8 flex items-center justify-center rounded-full hover:bg-primary/20 transition-colors">16</button>
                            </div>
                        </div>
                    </div>
                    <!-- Time Slots -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Giờ khám trống</label>
                        <div class="grid grid-cols-2 gap-2 max-h-[220px] overflow-y-auto pr-1">
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">08:00</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">08:30</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-primary bg-primary/10 text-primary rounded-lg font-bold">09:00</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">09:30</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">10:00</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">10:30</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">14:00</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">14:30</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all opacity-50 cursor-not-allowed">15:00</button>
                            <button
                                class="py-2.5 text-xs font-medium border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800 hover:border-primary transition-all">15:30</button>
                        </div>
                    </div>
                </div>
                <!-- Notes -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Ghi chú dặn dò bệnh
                        nhân</label>
                    <textarea
                        class="w-full p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                        placeholder="Ví dụ: Nhịn ăn sáng trước khi lấy máu, mang theo kết quả cũ..."
                        rows="3"></textarea>
                </div>
            </div>
            <!-- Modal Footer -->
            <div
                class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-3">
                <button
                    class="px-5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">
                    Hủy bỏ
                </button>
                <button
                    class="px-5 py-2.5 text-sm font-bold text-slate-900 bg-primary hover:bg-primary/90 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">send</span>
                    Lưu &amp; Gửi thông báo
                </button>
            </div>
        </div>
    </div>
</body>

</html>
