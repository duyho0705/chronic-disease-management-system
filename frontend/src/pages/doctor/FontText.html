<!DOCTYPE html>

<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gửi Lời Khuyên Chuyên Môn - Sống Khỏe</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4ade80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4ade8040;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-slate-200 flex items-center justify-center min-h-screen p-4">
    <!-- Modal Container -->
    <div
        class="bg-background-light dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div
            class="px-6 py-4 border-b border-primary/10 flex justify-between items-center bg-white dark:bg-background-dark">
            <div class="flex items-center gap-3">
                <div class="bg-primary/20 p-2 rounded-lg text-primary">
                    <span class="material-symbols-outlined text-2xl">medical_services</span>
                </div>
                <div>
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold font-display">Gửi lời khuyên chuyên
                        môn</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-xs">Bác sĩ gửi khuyến nghị sức khỏe trực tiếp cho
                        bệnh nhân</p>
                </div>
            </div>
            <button class="text-slate-400 hover:text-slate-600 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Content -->
        <div class="overflow-y-auto custom-scrollbar p-6 space-y-6">
            <!-- Patient Info Section -->
            <div class="bg-primary/5 rounded-lg p-4 flex items-center justify-between border border-primary/10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center overflow-hidden">
                        <img alt="Patient Avatar" class="w-full h-full object-cover"
                            data-alt="Chân dung bệnh nhân nam mỉm cười"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtVB7n9xlpmFXtOeY2kcwdFN0gPDzR-gYmz5kWin2lhImtB0Tfio_jluSsj10ww7lGuOoqKh9q8Elj09QkqMq7BJ40oUt3AYbY2txqsbRG874WAzDg2fD4pjzRP_mQ4ZzbB3uctFEmMcwwBn20OFvez08W4G1jrcOYstzwvRgy-aApJpbfNxeL-OzDeSqhJITy47-4-kB-ut44l940ExYvVGw4B6_fCW-p7lN9apEsYLs33totb5yNMu8o30on4aA0tgsTsaRcj7E" />
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Bệnh nhân nhận</p>
                        <p class="text-slate-900 dark:text-slate-100 font-bold">Nguyễn Văn A</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Mã bệnh nhân</p>
                    <p class="text-primary font-mono font-bold">BN-12345678</p>
                </div>
            </div>
            <!-- Selection Category -->
            <div class="space-y-2">
                <label class="text-slate-700 dark:text-slate-200 text-sm font-semibold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-lg">category</span>
                    Danh mục lời khuyên
                </label>
                <select
                    class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary">
                    <option value="">Chọn danh mục phù hợp...</option>
                    <option value="diet">Chế độ ăn uống</option>
                    <option value="exercise">Tập luyện thể chất</option>
                    <option value="habit">Thói quen sinh hoạt</option>
                    <option value="medication">Nhắc nhở dùng thuốc</option>
                </select>
            </div>
            <!-- Content Area -->
            <div class="space-y-2">
                <label class="text-slate-700 dark:text-slate-200 text-sm font-semibold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-lg">edit_note</span>
                    Nội dung chi tiết
                </label>
                <textarea
                    class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary placeholder:text-slate-400"
                    placeholder="Nhập nội dung khuyến nghị cụ thể cho bệnh nhân..." rows="4"></textarea>
            </div>
            <!-- Quick Templates -->
            <div class="space-y-3">
                <p class="text-slate-700 dark:text-slate-200 text-sm font-semibold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-lg">auto_awesome</span>
                    Thư viện lời khuyên mẫu
                </p>
                <div class="flex flex-wrap gap-2">
                    <button
                        class="px-3 py-1.5 rounded-full border border-primary/30 text-xs font-medium bg-primary/5 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white transition-all flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">box</span> Hạn chế muối
                    </button>
                    <button
                        class="px-3 py-1.5 rounded-full border border-primary/30 text-xs font-medium bg-primary/5 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white transition-all flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">directions_walk</span> Đi bộ 30p mỗi ngày
                    </button>
                    <button
                        class="px-3 py-1.5 rounded-full border border-primary/30 text-xs font-medium bg-primary/5 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white transition-all flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">monitor_heart</span> Theo dõi huyết áp định kỳ
                    </button>
                    <button
                        class="px-3 py-1.5 rounded-full border border-primary/30 text-xs font-medium bg-primary/5 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white transition-all flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">water_drop</span> Uống đủ 2L nước
                    </button>
                </div>
            </div>
            <!-- Options -->
            <div class="space-y-3 pt-2">
                <p class="text-slate-700 dark:text-slate-200 text-sm font-semibold">Tùy chọn gửi kèm theo</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 cursor-pointer hover:border-primary/50 transition-colors">
                        <input checked="" class="rounded text-primary focus:ring-primary h-5 w-5" type="checkbox" />
                        <div class="flex flex-col">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-100">Tin nhắn hệ
                                thống</span>
                            <span class="text-[10px] text-slate-500">Lưu vào hồ sơ bệnh án điện tử</span>
                        </div>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 cursor-pointer hover:border-primary/50 transition-colors">
                        <input checked="" class="rounded text-primary focus:ring-primary h-5 w-5" type="checkbox" />
                        <div class="flex flex-col">
                            <span class="text-sm font-medium text-slate-900 dark:text-slate-100">Thông báo Push</span>
                            <span class="text-[10px] text-slate-500">Gửi trực tiếp đến ứng dụng di động</span>
                        </div>
                    </label>
                </div>
            </div>
        </div>
        <!-- Footer Actions -->
        <div
            class="p-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800 flex items-center justify-end gap-3">
            <button
                class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 font-semibold text-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                Hủy bỏ
            </button>
            <button
                class="px-8 py-2.5 rounded-lg bg-primary text-white font-bold text-sm shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">send</span>
                Gửi ngay
            </button>
        </div>
    </div>
</body>

</html>
